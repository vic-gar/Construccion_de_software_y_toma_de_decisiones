<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World Simple App</title>
</head>
<body>

  <div class="container">
    <h1>Multipart File Upload</h1>
    <form action="/upload_file" method="POST" enctype="multipart/form-data">
      <div class="input-group">
        <label for="file">Select file</label>
        <input id="file" name="file" type="file" accept="image/png, image/jpg, image/jpeg" />
      </div>
      <button type="submit">Upload</button>
    </form>
  </div>

  <div class="container">
    <h1>Multipart File Private Upload</h1>
    <form action="/upload_file_private" method="POST" enctype="multipart/form-data">
      <div class="input-group">
        <label for="file-private">Select file</label>
        <input id="file-private" name="file" type="file" accept="image/png, image/jpg, image/jpeg" />
      </div>
      <button type="submit">Upload</button>
    </form>
  </div>

  <div class="container">
    <h1>Editar archivo</h1>
    <form action="/update_file" method="POST" enctype="multipart/form-data">
        
      <input type="hidden" name="ruta_anterior" value="public/imagen-existente.png" />
      <div class="input-group">
        <label for="file-edit">Nuevo archivo (opcional)</label>
        <input id="file-edit" name="file" type="file" accept="image/png, image/jpg, image/jpeg" />
      </div>
      <button type="submit">Actualizar</button>
    </form>
  </div>

</body>
</html>
