<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario</title>
</head>
<body>
    <h1>Formulario con POST</h1>

    <form action="/formulario/form_method" method="POST">
        <label for="imprimir">Texto a imprimir:</label>
        <input type="text" id="imprimir" name="imprimir">

        <br><br>

        <label for="indice">Número de veces:</label>
        <input type="number" id="indice" name="indice">

        <br><br>

        <button type="submit">Enviar</button>
    </form>
</body>
</html>
